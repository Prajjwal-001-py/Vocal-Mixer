<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Mixer | Pro Audio Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-mic-2">
                    <path d="m12 8-9.04 9.06a2.82 2.82 0 1 0 3.98 3.98L16 12" />
                    <circle cx="17" cy="7" r="5" />
                </svg>
                <span>VocalMixer</span>
            </div>
            <div class="status-bar" id="audio-context-status">
                <span class="status-indicator"></span>
                <span class="status-text">Audio Engine Ready</span>
            </div>
        </header>

        <main class="mixer-board">
            <!-- Vocal Track -->
            <section class="track-channel" id="track-vocal">
                <div class="track-header">
                    <h2>Vocals</h2>
                    <span class="track-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" x2="12" y1="19" y2="22" />
                        </svg>
                    </span>
                </div>

                <div class="file-loader">
                    <input type="file" id="input-vocal" accept="audio/*" hidden>
                    <label for="input-vocal" class="files-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" x2="12" y1="3" y2="15" />
                        </svg>
                        Load Audio
                    </label>
                    <span class="file-name" id="filename-vocal">No file selected</span>
                    <button class="mini-play-btn" id="preview-vocal" title="Preview Original">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                </div>

                <div id="trim-ui-vocal" class="hidden">
                    <div class="waveform-container">
                        <canvas id="wave-vocal" class="waveform-canvas" width="400" height="60"></canvas>
                    </div>
                    <div class="trim-controls">
                        <input type="range" class="slider" id="trim-start-vocal" min="0" value="0" step="0.01">
                        <input type="range" class="slider" id="trim-end-vocal" min="0" value="100" step="0.01">
                    </div>
                </div>

                <div class="controls">
                    <div class="control-row">
                        <div class="control-group">
                            <label>Volume</label>
                            <input type="range" class="slider volume-slider" id="vol-vocal" min="0" max="1.0"
                                step="0.01" value="0.8">
                        </div>
                        <div class="control-group">
                            <label>Reverb</label>
                            <input type="range" class="slider reverb-slider" id="rev-vocal" min="0" max="1.0"
                                step="0.01" value="0">
                        </div>
                    </div>

                    <button class="toggle-advanced-btn" id="toggle-adj-vocal">Show Advanced Controls</button>

                    <div class="advanced-controls hidden" id="adj-vocal">
                        <div class="control-group">
                            <label>Timing Offset (ms)</label>
                            <input type="range" class="slider" id="offset-vocal" min="-500" max="500" step="10"
                                value="0">
                            <span class="value-display" id="disp-offset-vocal">0ms</span>
                        </div>
                        <div class="control-group">
                            <label>Playback Speed</label>
                            <input type="range" class="slider" id="rate-vocal" min="0.5" max="2.0" step="0.05"
                                value="1.0">
                            <span class="value-display" id="disp-rate-vocal">1.0x</span>
                        </div>
                        <div class="control-group">
                            <label>Vocal Compressor</label>
                            <input type="range" class="slider" id="comp-vocal" min="0" max="1.0" step="0.01" value="0">
                        </div>
                        <div class="control-group">
                            <label>Low Cut / Gate</label>
                            <input type="range" class="slider" id="gate-vocal" min="0" max="500" step="10" value="0">
                            <span class="value-display" id="disp-gate-vocal">Off</span>
                        </div>
                    </div>
                </div>

                <div class="mute-group">
                    <button class="icon-btn mute-btn" id="mute-vocal" title="Mute">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 5 6 9H2v6h4l5 4V5z" />
                            <line x1="23" x2="1" y1="1" y2="23" />
                            <path d="M17 11.5a4.5 4.5 0 0 0-.6-2.4" />
                        </svg>
                    </button>
                    <button class="icon-btn solo-btn" id="solo-vocal" title="Solo">S</button>
                </div>

                <div class="meter-container">
                    <div class="meter-bar" id="meter-vocal"></div>
                </div>
            </section>

            <!-- Karaoke Track -->
            <section class="track-channel" id="track-karaoke">
                <div class="track-header">
                    <h2>Karaoke</h2>
                    <span class="track-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13" />
                            <circle cx="6" cy="18" r="3" />
                            <circle cx="18" cy="16" r="3" />
                        </svg>
                    </span>
                </div>

                <div class="file-loader">
                    <input type="file" id="input-karaoke" accept="audio/*" hidden>
                    <label for="input-karaoke" class="files-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" x2="12" y1="3" y2="15" />
                        </svg>
                        Load Audio
                    </label>
                    <span class="file-name" id="filename-karaoke">No file selected</span>
                    <button class="mini-play-btn" id="preview-karaoke" title="Preview Original">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                </div>

                <div id="trim-ui-karaoke" class="hidden">
                    <div class="waveform-container">
                        <canvas id="wave-karaoke" class="waveform-canvas" width="400" height="60"></canvas>
                    </div>
                    <div class="trim-controls">
                        <input type="range" class="slider" id="trim-start-karaoke" min="0" value="0" step="0.01">
                        <input type="range" class="slider" id="trim-end-karaoke" min="0" value="100" step="0.01">
                    </div>
                </div>

                <div class="controls">
                    <div class="control-row">
                        <div class="control-group">
                            <label>Volume</label>
                            <input type="range" class="slider volume-slider" id="vol-karaoke" min="0" max="1.0"
                                step="0.01" value="0.8">
                        </div>
                        <div class="control-group">
                            <label>Reverb</label>
                            <input type="range" class="slider reverb-slider" id="rev-karaoke" min="0" max="1.0"
                                step="0.01" value="0">
                        </div>
                    </div>

                    <button class="toggle-advanced-btn" id="toggle-adj-karaoke">Show Advanced Controls</button>

                    <div class="advanced-controls hidden" id="adj-karaoke">
                        <div class="control-group">
                            <label>Timing Offset (ms)</label>
                            <input type="range" class="slider" id="offset-karaoke" min="-500" max="500" step="10"
                                value="0">
                            <span class="value-display" id="disp-offset-karaoke">0ms</span>
                        </div>
                        <div class="control-group">
                            <label>Playback Speed</label>
                            <input type="range" class="slider" id="rate-karaoke" min="0.5" max="2.0" step="0.05"
                                value="1.0">
                            <span class="value-display" id="disp-rate-karaoke">1.0x</span>
                        </div>
                        <!-- Less useful for karaoke but kept for symmetry/experimentation -->
                        <div class="control-group">
                            <label>Compressor</label>
                            <input type="range" class="slider" id="comp-karaoke" min="0" max="1.0" step="0.01"
                                value="0">
                        </div>
                        <div class="control-group">
                            <label>Low Cut / Gate</label>
                            <input type="range" class="slider" id="gate-karaoke" min="0" max="500" step="10" value="0">
                            <span class="value-display" id="disp-gate-karaoke">Off</span>
                        </div>
                    </div>
                </div>

                <div class="mute-group">
                    <button class="icon-btn mute-btn" id="mute-karaoke" title="Mute">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 5 6 9H2v6h4l5 4V5z" />
                            <line x1="23" x2="1" y1="1" y2="23" />
                            <path d="M17 11.5a4.5 4.5 0 0 0-.6-2.4" />
                        </svg>
                    </button>
                    <button class="icon-btn solo-btn" id="solo-karaoke" title="Solo">S</button>
                </div>

                <div class="meter-container">
                    <div class="meter-bar" id="meter-karaoke"></div>
                </div>
            </section>
        </main>

        <footer class="master-controls">
            <div class="transport">
                <button class="transport-btn main-action" id="btn-play">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                </button>
                <button class="transport-btn" id="btn-pause" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16" />
                        <rect x="14" y="4" width="4" height="16" />
                    </svg>
                </button>
                <button class="transport-btn" id="btn-stop">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    </svg>
                </button>
            </div>

            <div class="master-volume">
                <label>Master Out</label>
                <input type="range" class="slider" id="vol-master" min="0" max="1.0" step="0.01" value="0.9">
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>

</html>
